<div class="min-h-screen bg-surface text-on-surface relative">

  <!-- Mobile Backdrop Overlay -->
  @if (isMobileMenuOpen()) {
    <div class="fixed inset-0 bg-slate-900/50 z-40 lg:hidden backdrop-blur-sm transition-opacity" (click)="isMobileMenuOpen.set(false)"></div>
  }

  <app-sidebar 
    [isMobileMenuOpen]="isMobileMenuOpen()" 
    [adminProfile]="adminProfile()" 
    (logoutAction)="logout()" 
    (closeMobileMenu)="isMobileMenuOpen.set(false)">
  </app-sidebar>

  <header class="fixed top-0 right-0 w-full lg:w-[calc(100%-16rem)] h-16 z-30 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md flex justify-between items-center px-4 md:px-8 shadow-sm dark:shadow-none transition-all duration-300">
    <div class="flex items-center flex-1 gap-2 md:gap-4">
      <button (click)="isMobileMenuOpen.set(true)" class="lg:hidden p-2 text-slate-500 hover:text-emerald-600 rounded-lg hover:bg-slate-100 transition-colors cursor-pointer">
        <span class="material-symbols-outlined">menu</span>
      </button>
      <div class="relative w-full max-w-sm lg:w-96 group">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
        <input class="w-full bg-surface-container-low border-none rounded-full pl-10 pr-4 py-2 text-sm focus:ring-2 focus:ring-primary/20 placeholder:text-slate-400 transition-all font-body" placeholder="Search orders, products..." type="text"/>
      </div>
    </div>
    <div class="flex items-center gap-2 md:gap-6 shrink-0">
      <button class="relative text-slate-500 hover:text-emerald-600 transition-colors duration-200 cursor-pointer hidden md:block">
        <span class="material-symbols-outlined">notifications</span>
        <span class="absolute top-0 right-0 w-2 h-2 bg-error rounded-full border-2 border-white"></span>
      </button>
      <button class="text-slate-500 hover:text-emerald-600 transition-colors duration-200 cursor-pointer hidden md:block">
        <span class="material-symbols-outlined">help_outline</span>
      </button>
      <div class="h-8 w-px bg-slate-200 hidden md:block"></div>
      
      <!-- Profile Dropdown -->
      <div class="relative">
        <img (click)="isProfileMenuOpen.set(!isProfileMenuOpen())" alt="Administrator Profile" class="w-8 h-8 rounded-full ring-2 ring-emerald-100 cursor-pointer object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBhqyhVrrn9cyToK7NfYnp2pIvRvDk1riX3lMNEDDAgJSWQ7wWmapB6pHc_jJHY1U60_slZz0OTErOVwRt6xTiGlNi4dghfKXFbX39DO_CkTsoigikPeDj6ltSFgPr9pnvsI7TLqKUc-mVbN47wWKYqXtsdJ-qB0_CCXzpR6dhih2BmctAqDm3RcwdBuJh9Rk9E3DzLPTb8TD6HyWkne9soRamtLlTNBG_A58YWtLSwqVqWhwdyiVnxtE8jCYur2aJKSkOVTNtfJTL3"/>
        
        @if (isProfileMenuOpen()) {
          <div class="absolute right-0 mt-2 w-48 bg-white border border-slate-100 rounded-xl shadow-lg py-2 z-50 animate-in fade-in zoom-in-95 duration-200">
            <div class="px-4 py-2 border-b border-slate-50 mb-2">
              <p class="text-sm font-bold text-emerald-900 truncate">{{ adminProfile()?.fullName || 'Admin' }}</p>
              <p class="text-xs text-slate-500 truncate">{{ adminProfile()?.email || 'admin@curatedemerald.com' }}</p>
            </div>
            <button class="w-full text-left px-4 py-2 text-sm text-slate-600 hover:bg-slate-50 hover:text-emerald-900 flex flex-row items-center gap-2">
              <span class="material-symbols-outlined text-[18px]">account_circle</span> Profile Settings
            </button>
            <button (click)="logout()" class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 hover:text-red-700 flex flex-row items-center gap-2">
              <span class="material-symbols-outlined text-[18px]">logout</span> Sign Out
            </button>
          </div>
        }
        <!-- Backdrop for dropdown -->
        @if (isProfileMenuOpen()) {
          <div class="fixed inset-0 z-40" (click)="isProfileMenuOpen.set(false)"></div>
        }
      </div>
    </div>
  </header>

  <div class="ml-0 lg:ml-64 pt-24 px-4 md:px-8 pb-12 min-h-screen transition-all duration-300">
    <router-outlet></router-outlet>
  </div>
</div>

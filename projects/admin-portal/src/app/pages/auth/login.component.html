<div class="h-screen flex flex-col bg-background overflow-hidden relative">
  <!-- Background Video -->
  <video autoplay loop muted playsinline preload="auto" 
    class="absolute inset-0 w-full h-full object-cover z-0 transition-opacity duration-1000"
    poster="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=2560&auto=format&fit=crop">
    <source
      src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260319_015952_e1deeb12-8fb7-4071-a42a-60779fc64ab6.mp4"
      type="video/mp4">
  </video>

  <!-- Navbar -->
  <nav class="relative z-20 flex items-center justify-between px-6 md:px-12 lg:px-20 py-5 font-body">
    <div class="flex items-center gap-2">
      <span class="text-foreground text-xl font-semibold tracking-tight">✦ Tiệm nhà Zịt</span>
    </div>
    <!-- <div class="hidden md:flex items-center gap-8">
      <a class="text-sm text-muted-foreground hover:text-foreground transition-colors cursor-pointer">Home</a>
      <a class="text-sm text-muted-foreground hover:text-foreground transition-colors cursor-pointer">Pricing</a>
      <a class="text-sm text-muted-foreground hover:text-foreground transition-colors cursor-pointer">About</a>
      <a class="text-sm text-muted-foreground hover:text-foreground transition-colors cursor-pointer">Contact</a>
    </div> -->
    <button
      class="bg-primary text-primary-foreground rounded-full px-5 py-2 text-sm font-medium hover:opacity-90 transition-all cursor-pointer">
      Get Started
    </button>
  </nav>

  <!-- Content Wrapper -->
  <main class="relative z-10 flex-grow flex flex-col items-center justify-center w-full max-w-md mx-auto px-6 animate-in fade-in slide-in-from-bottom-8 duration-1000">
    <div class="w-full max-w-md mx-auto">
      <!-- Brand/Logo (Optional but nice for context) -->
   

      <!-- Login Card -->
      <div class="rounded-3xl p-1 md:p-1.5"
        style="background: rgba(255, 255, 255, 0.4); border: 0.0625rem solid rgba(255, 255, 255, 0.5); box-shadow: var(--shadow-dashboard); backdrop-filter: blur(1.25rem);">

        <div
          class="bg-background/80 rounded-[1.4rem] p-8 border border-white/40 shadow-sm relative overflow-hidden group">
          <!-- Subtle Glow -->
          <div
            class="absolute -top-24 -right-24 w-48 h-48 bg-accent/10 rounded-full blur-3xl group-hover:bg-accent/20 transition-all duration-700">
          </div>

          <div class="relative z-10">
            <div class="flex flex-col items-center mb-5">
              <div class="w-12 h-12 bg-primary rounded-2xl flex items-center justify-center mb-4 shadow-xl shadow-primary/20">
                <span class="text-primary-foreground text-2xl font-bold">Z</span>
              </div>
              <h1 class="font-serif italic font-medium text-3xl text-foreground tracking-tight">Tiệm nhà Zịt</h1>
              <p class="font-body text-sm text-muted-foreground mt-1">Administrative Portal</p>
            </div>

            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
              @if (context.errorMessage()) {
              <div
                class="p-3 bg-red-500/10 border border-red-500/20 text-red-600 rounded-xl text-xs flex items-center gap-2 animate-in fade-in zoom-in duration-300">
                <lucide-icon name="alert-circle" class="h-4 w-4"></lucide-icon>
                <span>{{ context.errorMessage() }}</span>
              </div>
              }

              <div class="space-y-2">
                <label class="text-[0.6875rem] font-bold uppercase tracking-widest text-muted-foreground ml-1">
                  Email</label>
                <div class="relative">
                  <div
                    class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-muted-foreground/60 transition-colors">
                    <lucide-icon name="search" class="h-4 w-4"></lucide-icon>
                  </div>
                  <input formControlName="email" type="email" placeholder="admin@tiemnhazit.com"
                    class="w-full h-12 pl-10 pr-4 bg-secondary/30 border border-border rounded-xl focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent transition-all font-body text-sm placeholder:text-muted-foreground/40">
                </div>
              </div>

              <div class="space-y-2">
                <div class="flex justify-between items-center ml-1">
                  <label class="text-[0.6875rem] font-bold uppercase tracking-widest text-muted-foreground">Password</label>
                </div>
                <div class="relative">
                  <div
                    class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-muted-foreground/60 transition-colors">
                    <lucide-icon name="credit-card" class="h-4 w-4"></lucide-icon>
                  </div>
                  <input formControlName="password" type="password" placeholder="••••••••"
                    class="w-full h-12 pl-10 pr-4 bg-secondary/30 border border-border rounded-xl focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent transition-all font-body text-sm placeholder:text-muted-foreground/40">
                </div>
              </div>

              <div class="pt-2">
                <button type="submit" [disabled]="context.isLoading()"
                  class="w-full h-12 bg-primary text-primary-foreground font-bold rounded-xl hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:scale-100 shadow-lg shadow-primary/20">
                  @if (context.isLoading()) {
                  <div
                    class="w-4 h-4 border-2 border-primary-foreground/30 border-t-primary-foreground rounded-full animate-spin">
                  </div>
                  <span>Verifying...</span>
                  } @else {
                  <span>Sign In</span>
                  <lucide-icon name="arrow-right" class="h-4 w-4"></lucide-icon>
                  }
                </button>
              </div>
            </form>
            
            <div class="mt-6 flex items-center gap-4">
              <div class="h-[0.0625rem] flex-1 bg-border/50"></div>
              <span class="text-[0.625rem] text-muted-foreground uppercase tracking-widest font-bold">OR</span>
              <div class="h-[0.0625rem] flex-1 bg-border/50"></div>
            </div>

            <div class="mt-6">
              <button 
                type="button" 
                (click)="loginWithGoogle()"
                [disabled]="context.isLoading()"
                class="w-full h-12 bg-white text-black font-semibold rounded-xl hover:bg-gray-50 active:scale-[0.98] transition-all flex items-center justify-center gap-3 border border-border/60 shadow-sm disabled:opacity-50 cursor-pointer">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google">
                <span>Continue with Google</span>
              </button>
            </div>

            <!-- Removed the nested footer to maintain vertical constraints on 13-inch displays -->
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer Info -->
  <footer class="absolute bottom-8 z-10 w-full text-center px-6">
    <p class="text-xs text-muted-foreground/60 font-body">
      &copy; 2019 Tiệm nhà Zịt. All rights reserved.
    </p>
  </footer>

  <!-- Subtle Decorations -->
  <div
    class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[50.0rem] h-[50.0rem] bg-accent/5 rounded-full blur-[7.5rem] z-0 pointer-events-none">
  </div>
</div>

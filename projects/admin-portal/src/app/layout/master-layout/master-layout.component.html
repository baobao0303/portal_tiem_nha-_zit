<z-layout class="min-h-screen bg-zinc-50 dark:bg-zinc-950">
  <z-sidebar [zCollapsible]="true" class="border-r border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 shadow-sm">
    <div class="flex h-16 items-center px-6 border-b border-zinc-200 dark:border-zinc-800 font-bold text-lg tracking-tight">
      <span class="text-zinc-900 dark:text-white mr-2">✦</span> Artisana Admin
    </div>
    
    <div class="flex-1 py-6 px-4 space-y-1 overflow-y-auto">
      <z-sidebar-group-label class="px-3 text-[0.7rem] font-semibold text-zinc-500 uppercase tracking-wider mb-2">
        Overview
      </z-sidebar-group-label>
      
      <button z-button variant="ghost" class="w-full justify-start font-medium h-10" routerLink="/dashboard" routerLinkActive="bg-zinc-100 dark:bg-zinc-800 text-zinc-900 dark:text-white font-semibold">
        <lucide-icon [img]="LayoutDashboard" class="mr-3 h-[18px] w-[18px]"></lucide-icon>
        Dashboard
      </button>
      
      <z-sidebar-group-label class="px-3 text-[0.7rem] font-semibold text-zinc-500 uppercase tracking-wider mt-6 mb-2">
        Store Management
      </z-sidebar-group-label>

      <button z-button variant="ghost" class="w-full justify-start font-medium mt-1 h-10 text-zinc-600 dark:text-zinc-400" routerLink="/products" routerLinkActive="!bg-zinc-100 dark:!bg-zinc-800 !text-zinc-900 dark:!text-white font-semibold">
        <lucide-icon [img]="Package" class="mr-3 h-[18px] w-[18px]"></lucide-icon>
        Products
      </button>
      
      <button z-button variant="ghost" class="w-full justify-start font-medium mt-1 h-10 text-zinc-600 dark:text-zinc-400" routerLink="/orders" routerLinkActive="!bg-zinc-100 dark:!bg-zinc-800 !text-zinc-900 dark:!text-white font-semibold">
        <lucide-icon [img]="ShoppingCart" class="mr-3 h-[18px] w-[18px]"></lucide-icon>
        Orders
      </button>
      
      <z-sidebar-group-label class="px-3 text-[0.7rem] font-semibold text-zinc-500 uppercase tracking-wider mt-6 mb-2">
        System
      </z-sidebar-group-label>
      
      <button z-button variant="ghost" class="w-full justify-start font-medium text-zinc-600 dark:text-zinc-400 mt-1 h-10">
        <lucide-icon [img]="Settings" class="mr-3 h-[18px] w-[18px]"></lucide-icon>
        Settings
      </button>
    </div>
    
    <div class="p-4 border-t border-zinc-200 dark:border-zinc-800 bg-zinc-50/50 dark:bg-zinc-900/50">
      <button z-button variant="outline" class="w-full justify-start h-10 text-red-600 dark:text-red-500 hover:bg-red-50 dark:hover:bg-red-950/30 hover:text-red-700 dark:hover:text-red-400 border-zinc-200 dark:border-zinc-800">
        <lucide-icon [img]="LogOut" class="mr-3 h-[18px] w-[18px]"></lucide-icon>
        Logout
      </button>
    </div>
  </z-sidebar>
  
  <z-content class="flex flex-col flex-1 min-w-0">
    <z-header class="h-16 border-b border-zinc-200 dark:border-zinc-800 bg-white/80 dark:bg-zinc-900/80 backdrop-blur-md sticky top-0 z-10 flex items-center justify-between px-6 md:px-8">
      <div class="flex items-center text-sm font-medium text-zinc-500">
        <!-- Breadcrumb / Context could go here -->
      </div>
      
      <div class="flex items-center gap-4">
        <z-avatar zSrc="https://api.dicebear.com/7.x/notionists/svg?seed=Admin" zFallback="AD" class="h-9 w-9 border border-zinc-200 dark:border-zinc-800 shadow-sm"></z-avatar>
      </div>
    </z-header>
    
    <div class="flex-1 overflow-auto flex flex-col items-center">
      <div class="p-6 md:p-8 w-full max-w-7xl">
        <router-outlet></router-outlet>
      </div>
    </div>
  </z-content>
</z-layout>

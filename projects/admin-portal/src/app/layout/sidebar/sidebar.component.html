<aside
  [class]="(isCollapsed() ? 'w-20' : 'w-64') + ' fixed left-0 top-0 flex flex-col h-full bg-primary/95 backdrop-blur-2xl border-r border-white/5 z-50 transition-all duration-500 ease-out lg:translate-x-0 ' + (isMobileMenuOpen() ? 'translate-x-0' : '-translate-x-full')">

  <!-- Collapse toggle button -->
  <button (click)="onToggleCollapse()"
    class="absolute -right-3.5 top-8 bg-primary border border-white/10 text-white/50 hover:text-accent rounded-full p-1.5 shadow-xl shadow-black/20 hidden lg:flex items-center justify-center z-50 cursor-pointer transition-all hover:scale-110 active:scale-95 group">
    <lucide-icon [name]="isCollapsed() ? 'chevron-right' : 'chevron-left'" class="h-3 w-3 transition-transform group-hover:translate-x-0.5"
      [class.group-hover:-translate-x-0.5]="!isCollapsed()">
    </lucide-icon>
  </button>

  <!-- Branding Section -->
  <div class="flex flex-col justify-center shrink-0 h-[7.5rem] relative overflow-hidden transition-all duration-500" [ngClass]="isCollapsed() ? 'p-0 items-center' : 'p-6 lg:p-8'">
    <!-- Accent GLow -->
    <div class="absolute -top-10 -left-10 w-24 h-24 bg-accent/10 rounded-full blur-2xl animate-pulse"></div>
    
    <div [class.hidden]="isCollapsed()" class="w-full relative z-10 animate-in fade-in slide-in-from-left-4 duration-700">
      <div role="heading" aria-level="1" class="font-display text-3xl text-white tracking-tight leading-none">
        Tiệm nhà <span class="italic text-accent">zịt</span>
      </div>
      <div class="flex items-center gap-1.5 mt-2">
        <div class="w-1 h-1 rounded-full bg-accent animate-pulse"></div>
        <p class="text-[0.625rem] text-white/40 font-bold uppercase tracking-[0.2em]">Nexus Authority</p>
      </div>
    </div>
    
    @if (isCollapsed()) {
    <div class="w-full flex justify-center items-center relative z-10 animate-in zoom-in duration-500">
      <div class="w-10 h-10 bg-accent rounded-xl flex items-center justify-center shadow-lg shadow-accent/20">
        <span class="text-accent-foreground text-xl font-bold">Z</span>
      </div>
    </div>
    }
    
    <button (click)="onCloseMobileMenu()"
      class="lg:hidden absolute right-4 top-4 p-2 text-white/50 hover:bg-white/10 rounded-full transition-colors cursor-pointer">
      <lucide-icon name="x" class="h-4 w-4"></lucide-icon>
    </button>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 px-4 space-y-2 overflow-y-auto mt-6 scrollbar-hide">
    <p [class.hidden]="isCollapsed()" class="px-4 pb-3 text-[0.5625rem] font-black uppercase tracking-[0.25em] text-white/20">Operations</p>
    
    <!-- Dashboard -->
    <a routerLink="/dashboard" (click)="onCloseMobileMenu()" 
      routerLinkActive="bg-accent/10 text-accent border border-accent/20"
      [routerLinkActiveOptions]="{exact: true}" 
      [class.justify-center]="isCollapsed()"
      class="flex items-center px-4 py-3 gap-3.5 text-white/50 font-bold hover:bg-white/5 hover:text-white rounded-2xl transition-all duration-300 cursor-pointer group relative">
      <lucide-icon name="layout-dashboard" class="h-4 w-4 transition-transform group-hover:scale-110"></lucide-icon>
      <span [class.hidden]="isCollapsed()" class="font-body text-[0.8125rem] tracking-tight whitespace-nowrap">Intelligence</span>
      <div *routerLinkActive="'block'" class="hidden absolute left-0 w-1 h-4 bg-accent rounded-r-full"></div>
    </a>

    <!-- Products -->
    <a routerLink="/products" (click)="onCloseMobileMenu()" 
      routerLinkActive="bg-accent/10 text-accent border border-accent/20"
      [class.justify-center]="isCollapsed()"
      class="flex items-center px-4 py-3 gap-3.5 text-white/50 font-bold hover:bg-white/5 hover:text-white rounded-2xl transition-all duration-300 cursor-pointer group relative">
      <lucide-icon name="shopping-bag" class="h-4 w-4 transition-transform group-hover:scale-110"></lucide-icon>
      <span [class.hidden]="isCollapsed()" class="font-body text-[0.8125rem] tracking-tight whitespace-nowrap">Product Assets</span>
    </a>

    <!-- Categories -->
    <a routerLink="/categories" (click)="onCloseMobileMenu()" 
      routerLinkActive="bg-accent/10 text-accent border border-accent/20"
      [class.justify-center]="isCollapsed()"
      class="flex items-center px-4 py-3 gap-3.5 text-white/50 font-bold hover:bg-white/5 hover:text-white rounded-2xl transition-all duration-300 cursor-pointer group relative">
      <lucide-icon name="boxes" class="h-4 w-4 transition-transform group-hover:scale-110"></lucide-icon>
      <span [class.hidden]="isCollapsed()" class="font-body text-[0.8125rem] tracking-tight whitespace-nowrap">Taxonomy</span>
    </a>

    <!-- Orders -->
    <a routerLink="/orders" (click)="onCloseMobileMenu()" 
      routerLinkActive="bg-accent/10 text-accent border border-accent/20"
      [class.justify-center]="isCollapsed()"
      class="flex items-center px-4 py-3 gap-3.5 text-white/50 font-bold hover:bg-white/5 hover:text-white rounded-2xl transition-all duration-300 cursor-pointer group relative">
      <lucide-icon name="shopping-cart" class="h-4 w-4 transition-transform group-hover:scale-110"></lucide-icon>
      <span [class.hidden]="isCollapsed()" class="font-body text-[0.8125rem] tracking-tight whitespace-nowrap">Transactions</span>
    </a>

  </nav>

  <!-- Profile section -->
  <div class="mt-auto mb-6 shrink-0 backdrop-blur-sm relative group overflow-hidden bg-white/5 border border-white/5 transition-all duration-500" 
       [ngClass]="isCollapsed() ? 'p-1.5 mx-3 rounded-[1.25rem]' : 'p-4 mx-4 rounded-[1.5rem]'">
    <!-- Subtle Gradient -->
    <div class="absolute inset-0 bg-gradient-to-br from-white/5 to-transparent pointer-events-none"></div>
    
    <div class="flex items-center relative z-10" [ngClass]="isCollapsed() ? 'justify-center' : 'justify-between gap-3'">
      <div class="flex items-center w-full" [ngClass]="isCollapsed() ? 'justify-center mx-0' : 'gap-3.5'">
        <div class="relative shrink-0 transition-transform duration-300 group-hover:scale-105">
          <img alt="Avatar" class="w-10 h-10 rounded-xl object-cover border border-white/10 shadow-lg"
            [src]="adminProfile()?.avatar || 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?q=80&w=100&auto=format&fit=crop'" />
          <div class="absolute -bottom-0.5 -right-0.5 w-3 h-3 bg-emerald-500 border-2 border-primary rounded-full shadow-sm"></div>
        </div>
        
        <div [class.hidden]="isCollapsed()" class="overflow-hidden flex-1 animate-in fade-in slide-in-from-left-2 duration-500">
          <p class="text-[0.75rem] font-bold text-white truncate group-hover:text-accent transition-colors">{{ adminProfile()?.fullName || 'Root Admin' }}</p>
          <p class="text-[0.5625rem] text-white/40 uppercase tracking-widest truncate mt-0.5 font-black">{{ adminProfile()?.role || 'Authority' }}</p>
        </div>
      </div>
      
      <button [class.hidden]="isCollapsed()" (click)="onLogout()"
        class="p-2.5 text-white/30 hover:text-rose-500 hover:bg-rose-500/10 rounded-xl transition-all duration-300 cursor-pointer shrink-0 group-hover:rotate-12"
        title="Terminate Session">
        <lucide-icon name="log-out" class="h-4 w-4"></lucide-icon>
      </button>
    </div>
  </div>
</aside>
